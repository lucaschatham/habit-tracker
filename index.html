<style>
:root{
  --bg:#1A1C1F; --silver:#E8E8E6; --silver2:#C9CBCD; --gray:#9A9DA1; --steel:#6B6E72;
  --gunmetal:#3A3D42; --line:rgba(232,232,230,.08);
  --done:#D4D6D8; --miss:#CB3A2D; --excused:#41454b; --empty:rgba(232,232,230,.07); --ring:rgba(232,232,230,.80);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0E0F11;color:var(--silver);min-height:100dvh;font-family:"Geist",-apple-system,ui-sans-serif,system-ui,sans-serif;font-feature-settings:"ss01","tnum";letter-spacing:-.014em}
body{display:flex;flex-direction:column;align-items:center;padding:24px 12px 60px;gap:14px}
button{font:inherit}
.mono{font-family:"Geist Mono","SF Mono",ui-monospace,monospace}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.phone{width:390px;max-width:100%;background:var(--bg);border:1px solid #2a2d31;border-radius:34px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.scr{min-height:760px;overflow-x:hidden}
.bar{position:sticky;top:0;z-index:8;display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;background:rgba(26,28,31,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.bar .b{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--steel);font-weight:500}
.bar .live{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel)}
.bar .live .d{width:5px;height:5px;border-radius:50%;background:var(--miss);animation:beat 2.4s ease-in-out infinite}
@keyframes beat{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.hero{padding:20px 18px 16px;display:flex;align-items:flex-end;gap:18px;border-bottom:1px solid var(--line)}
.hero .big{font-size:52px;font-weight:700;line-height:.92;letter-spacing:-.03em;color:var(--silver)}
.hero .big small{font-size:22px;font-weight:600;color:var(--gray);margin-left:1px}
.hero .meta{display:flex;flex-direction:column;gap:3px;padding-bottom:4px}
.hero .meta .k{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--steel)}
.hero .meta .v{font-size:13px;color:var(--silver2)}
.hero .meta .v b{color:var(--silver);font-weight:600}
.ctrl{display:flex;justify-content:space-between;gap:8px;padding:13px 18px 4px;align-items:center}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:3px;overflow:hidden}
.seg button{font-family:inherit;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);background:transparent;border:none;padding:7px 11px;cursor:pointer;transition:.15s}
.seg button.on{background:var(--silver);color:var(--bg)}
.chips{display:flex;gap:6px}
.chip{font-family:inherit;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--steel);border:1px solid var(--line);border-radius:3px;padding:7px 9px;cursor:pointer;background:transparent;transition:.15s}
.chip.on{color:var(--silver);border-color:rgba(232,232,230,.28)}
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:11px 18px 2px;font-size:9px;letter-spacing:.05em;color:var(--steel)}
.lg{display:flex;align-items:center;gap:5px}
.sw{width:11px;height:11px;border-radius:2px;display:inline-block;flex:0 0 auto}
.sw.complete{background:var(--done)} .sw.missed{background:var(--miss)} .sw.excused{background:var(--excused)} .sw.today{background:transparent;outline:1.5px solid var(--ring);outline-offset:-1px}
.keyax{display:flex;justify-content:flex-end;padding:0 18px 2px;font-size:8px;letter-spacing:.12em;color:var(--gunmetal)}
.list{padding:2px 18px 22px}
.sec{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--steel);padding:15px 0 9px;margin-top:8px;border-top:1px solid var(--line)}
.sec:first-child{border-top:none;margin-top:0}
.sec .cd{font-size:8px;color:var(--gunmetal);letter-spacing:.1em}
.habit{padding:9px 0 10px;cursor:pointer;border-bottom:1px solid rgba(232,232,230,.04);animation:rise .45s cubic-bezier(.2,.7,.2,1) both}
.hrow{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
.nm{font-size:13.5px;color:var(--silver2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat{flex:0 0 auto;display:flex;align-items:baseline;gap:8px}
.stat .rt{font-size:14px;font-weight:600;color:var(--silver);font-variant-numeric:tabular-nums}
.lhead{padding:7px 18px 1px;text-align:right;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gunmetal)}
.stat .tr{font-size:9px;font-weight:600}
.stat .tr.up{color:var(--silver2)} .stat .tr.dn{color:var(--steel)}
.stat .sk{font-size:10px;color:var(--steel);display:inline-flex;align-items:center;gap:4px}
.stat .sk .dot{width:5px;height:5px;border-radius:50%;background:var(--silver);box-shadow:0 0 5px rgba(232,232,230,.5)}
.stat .sk.cold .dot{background:var(--gunmetal);box-shadow:none}
.strip{display:grid;gap:2px;width:calc(100% - 1px)}
.cell,.wmark{aspect-ratio:1;border-radius:2px;background:var(--empty)}
.wmark{width:15px;height:15px;aspect-ratio:auto;border-radius:3px}
.wstrip{display:flex;gap:7px}
.complete{background:var(--done)!important} .missed{background:var(--miss)!important} .excused{background:var(--excused)!important}
.incomplete{background:rgba(232,232,230,.035)!important;box-shadow:inset 0 0 0 1px rgba(232,232,230,.10)}
.now{outline:1.5px solid var(--ring);outline-offset:1px}
.detail{max-height:0;overflow:hidden;transition:max-height .25s ease;font-size:11px;color:var(--steel)}
.habit.open .detail{max-height:60px}
.detail .in{display:flex;gap:14px;padding-top:10px;flex-wrap:wrap}
.detail .in b{color:var(--silver2);font-weight:600}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>

      var stat = '<div class="stat"><span class="rt mono">' + rate(h) + '%</span>' + trHtml + '<span class="sk mono ' + (active ? '' : 'cold') + '"><span class="dot"></span>' + (active ? cs + su : '—') + '</span></div>';
      var hrow = '<div class="hrow"><span class="nm">' + esc(h.n) + '</span>' + stat + '</div>';
      var strip = '';
      if (h.sec === 'Weekly'){
        strip = '<div class="wstrip">';
        for (var w = 0; w < slots(h); w++) strip += '<div class="wmark ' + (h.wk[w] || 'incomplete') + (w === 0 ? ' now' : '') + '"></div>';
        strip += '</div>';
      } else {
        strip = '<div class="strip" style="grid-template-columns:repeat(' + slots(h) + ',1fr)">';
        for (var i = 0; i < slots(h); i++) strip += '<div class="cell ' + (h.st[i] || 'incomplete') + (i === 0 ? ' now' : '') + '"></div>';
        strip += '</div>';
      }
      var detail = '<div class="detail"><div class="in mono"><span>rate <b>' + rate(h) + '%</b> (' + doneN(h) + '/' + counted(h) + ')</span>' +
        '<span>current <b>' + (active ? cs + su : '0') + '</b></span><span>best <b>' + bestStreak(a) + su + '</b></span>' +
        (h.numeric && h.sec !== 'Weekly' ? '<span>last <b>' + lastValue(h) + '</b></span>' : '') + '</div></div>';
      el.innerHTML = hrow + strip + detail;
      el.addEventListener('click', function(){ el.classList.toggle('open'); });
      list.appendChild(el);
    });
  }
  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  document.querySelectorAll('.seg button').forEach(function(b){ b.addEventListener('click', function(){ document.querySelectorAll('.seg button').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); WIN = +b.dataset.w; render(); }); });
  document.querySelectorAll('.chip').forEach(function(b){ b.addEventListener('click', function(){ document.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); curF = b.dataset.f; render(); }); });
  var hasExcused = habits.some(function(h){ return h.st.indexOf('excused') !== -1; });
  if (!hasExcused){
    var lgEx = document.getElementById('lg-excused'); if (lgEx) lgEx.style.display = 'none';
    var kxEx = document.getElementById('keyax-excused'); if (kxEx) kxEx.style.display = 'none';
  }
  window._v5HabitData = { habits: habits, dates: dates, curStreak: curStreak, win: win, rate: rate };
  render();
})();
</script>
</body></html>
